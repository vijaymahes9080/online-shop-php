<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>users</title>
   <!-- font awesome cdn link  -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <!-- custom admin css file link  -->
   <link rel="stylesheet" href="css/admin_style.css">
</head>
<body>
   
<!-- Admin Header Included -->
<header class="header">
   <div class="flex">
      <a href="admin_page.html" class="logo">Admin<span>Panel</span></a>
      <nav class="navbar">
         <a href="admin_page.html">home</a>
         <a href="admin_products.html">products</a>
         <a href="admin_orders.html">orders</a>
         <a href="admin_users.html">users</a>
         <a href="admin_contacts.html">messages</a>
      </nav>
      <div class="icons">
         <div id="menu-btn" class="fas fa-bars"></div>
         <div id="user-btn" class="fas fa-user"></div>
      </div>
      <div class="account-box">
         <p>username : <span></span></p>
         <p>email : <span></span></p>
         <a href="#" onclick="logoutUser()" class="delete-btn">logout</a>
         <div>new <a href="login.html">login</a> | <a href="register.html">register</a></div>
      </div>
   </div>
</header>

<section class="users">
   <h1 class="title">user accounts</h1>
   <div class="box-container" id="usersContainer">
      <!-- Users loaded dynamically -->
   </div>
</section>

<script src="js/db.js"></script>
<script src="js/admin_script.js"></script>
<script>
   document.addEventListener('DOMContentLoaded', () => {
      // Authenticate as Admin
      const admin = checkAuth('admin');
      if (!admin) return;

      const container = document.getElementById('usersContainer');

      function renderUsers() {
         const users = getUsers();
         container.innerHTML = '';

         users.forEach(u => {
            const box = document.createElement('div');
            box.className = 'box';
            
            box.innerHTML = `
               <p> user id : <span>${u.id}</span> </p>
               <p> username : <span>${u.name}</span> </p>
               <p> email : <span>${u.email}</span> </p>
               <p> user type : <span style="color:${u.user_type === 'admin' ? 'var(--orange)' : ''}">${u.user_type}</span> </p>
               <button class="delete-btn" id="deleteUser-${u.id}" ${u.id === admin.id ? 'disabled style="opacity: 0.5; pointer-events: none;"' : ''}>delete user</button>
            `;

            box.querySelector(`#deleteUser-${u.id}`).addEventListener('click', () => {
               if (confirm('delete this user account?')) {
                  // We delete the user by updating users array in db.js
                  let allUsers = getUsers();
                  allUsers = allUsers.filter(x => x.id !== u.id);
                  saveUsers(allUsers);
                  showNotification('user deleted successfully!');
                  renderUsers();
               }
            });

            container.appendChild(box);
         });
      }

      renderUsers();
   });
</script>
</body>
</html>
