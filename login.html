<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>login</title>
   <!-- font awesome cdn link  -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <!-- custom css file link  -->
   <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
   <form id="loginForm">
      <h3>login now</h3>
      <input type="email" id="email" placeholder="enter your email" required class="box">
      <input type="password" id="password" placeholder="enter your password" required class="box">
      <input type="submit" value="login now" class="btn">
      <p>don't have an account? <a href="register.html">register now</a></p>
   </form>
</div>

<script src="js/db.js"></script>
<script>
   document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect
      const user = getCurrentUser();
      if (user) {
         window.location.href = user.user_type === 'admin' ? 'admin_page.html' : 'home.html';
      }

      const loginForm = document.getElementById('loginForm');
      loginForm.addEventListener('submit', (e) => {
         e.preventDefault();
         const emailValue = document.getElementById('email').value.trim();
         const passwordValue = document.getElementById('password').value;

         const result = loginUser(emailValue, passwordValue);
         if (result.success) {
            showNotification('Logged in successfully!');
            setTimeout(() => {
               window.location.href = result.user.user_type === 'admin' ? 'admin_page.html' : 'home.html';
            }, 1000);
         } else {
            showNotification(result.message);
         }
      });
   });
</script>
</body>
</html>
